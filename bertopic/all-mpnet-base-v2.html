    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #ffffff;
        font-family: Roboto;
        color: #000000;
      }
      .container-box {
        margin: 4px;
        padding: 12px;
        border-radius: 16px;
        line-height: 0.95;
        z-index: 2;
        background: #ffffffaa;
        box-shadow: 2px 3px 10px #aaaaaa44;
      }
      .more-opaque {
        background-color: #ffffffee;
      }
      #deck-container {
        width: 100vw;
        height: 100vh;
      }
      #deck-container canvas {
        z-index: 1;
        background: #ffffff;
      }
      .deck-tooltip {
          
            font-size: 0.8em;
            font-family: Roboto;
            font-weight: 300;
            color: #000000 !important;
            background-color: #ffffffaa !important;
            border-radius: 12px;
            box-shadow: 2px 3px 10px #aaaaaa44;
            max-width: 25%;
      }
      input {
        margin: 2px;
        padding: 4px;
        border-radius: 8px;
        color: #000000;
        background: #ffffffdd;
        border: 1px solid #ddddddff;
        transition: 0.5s;
        outline: none;
      }
      input:focus {
        border: 2px solid #555;
      }
      #loading {
        width: 100%;
        height: 100%;
        top: 0px;
        left: 0px;
        position: absolute;
        display: block;
        z-index: 99
      }
      #loading-image {
        position: absolute;
        top: 45%;
        left: 47.5%;
        z-index: 100
      }
      #title-container {
        /* position: absolute; */
        top: 0;
        left: 0;
      }
      .content-wrapper {
        /* position: relative; */
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        padding: 8px;
        /* Use grid to create the basic layout */
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        min-height: calc(100vh - 16px); /* Account for padding */
        pointer-events: none; /* pass pointer events through */
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 4px;
        pointer-events: auto; /* allow pointer events */
        max-height: 50vh;
        overflow-y: visible;
      }
      .top-left {
        grid-column: 1;
        grid-row: 1;
        justify-self: start;
        align-self: start;
      }
      .bottom-left {
        grid-column: 1;
        grid-row: 2;
        justify-self: start;
        align-self: end;
        display: flex;
        flex-direction: column-reverse;
        transform: scaleY(-1);
      }

      .top-right {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        align-self: start;
      }
      .bottom-right {
        grid-column: 2;
        grid-row: 2;
        justify-self: end;
        align-self: end;
        display: flex;
        flex-direction: column-reverse;
        transform: scaleY(-1);
      }
      .stack.bottom-left .stack-box {
        transform: scaleY(-1);
      }
      .stack.bottom-right .stack-box {
        transform: scaleY(-1);
      }
      #search-container{
        width: fit-content;
      }
    </style>

            result.set(arr, currentLength);
            currentLength += arr.length;

      const progressText = document.querySelector(`#${id} .datamapplot-progress-bar-text`);
      progressBar.style.width = `${progress}%`;
      progressText.textContent = `${id.replace('-progress', '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}: ${progress}%`;
    }

    function checkAllDataLoaded() {
      const progressBars = document.querySelectorAll('.datamapplot-progress-bar-fill');
      const allLoaded = Array.from(progressBars).every(bar => bar.style.width === '100%');
      if (allLoaded) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("progress-container").style.display = "none";
      }
    }

    function loadPointDataLayer() {
      pointDataWorker.postMessage({encodedData: pointDataEncoded, JSONParse: false});

      pointDataWorker.onmessage = async function(event) {
        if (event.data.type === "progress") {
          updateProgressBar('point-data-progress', event.data.progress);
        } else {
          const { data } = event.data;
          
          const pointData = await simpleArrowParser(data);
          
          datamap.addPoints(
            pointData,
            {
              pointSize: 0.1,
              pointOutlineColor: [250, 250, 250, 128],
              pointLineWidth: 0.001,
              pointHoverColor: [170, 0, 0, 187],
              pointLineWidthMaxPixels: 3,
              pointLineWidthMinPixels: 0.001,
              pointRadiusMaxPixels: 24,
              pointRadiusMinPixels: 0.01,
            }
          );

          document.getElementById("loading").style.display = "none";
          updateProgressBar('point-data-progress', 100);
          checkAllDataLoaded();}
      };

      
    }

    function loadLabelDataLayer() {
      labelDataWorker.postMessage({encodedData: labelDataEncoded, JSONParse: true});

      labelDataWorker.onmessage = async function(event) {
        if (event.data.type === "progress") {
          updateProgressBar('label-data-progress', event.data.progress);
        } else {
          const { data } = event.data;
          const labelData = data;
          datamap.addLabels(labelData, {
            labelTextColor: d => [d.r, d.g, d.b],
            textMinPixelSize: 18,
            textMaxPixelSize: 36,
            textOutlineWidth: 8,
            textOutlineColor: [238, 238, 238, 221],
            textBackgroundColor: [255, 255, 255, 64],
            fontFamily: "Roboto",
            fontWeight: 600,
            lineSpacing: 0.95,
            textCollisionSizeScale: 3,
          });

          
          document.getElementById("loading").style.display = "none";
          updateProgressBar('label-data-progress', 100);
          checkAllDataLoaded();
        }
      };
    }

    function loadMetaData() {
      metaDataWorker.postMessage({encodedData: hoverDataEncoded, JSONParse: true});

      metaDataWorker.onmessage = async function(event) {
        if (event.data.type === "progress") {
          updateProgressBar('meta-data-progress', event.data.progress);
        } else {
          const { data } = event.data;
          const hoverData = data;
          datamap.addMetaData(hoverData, {
            tooltipFunction: ({index}) => hoverData.hover_text[index],
            onClickFunction: null,
            searchField: "hover_text",
          });

          
          function debounce(func, timeout = 250){
              let timer;
              return (...args) => {
                  clearTimeout(timer);
                  timer = setTimeout(() => { func.apply(this, args); }, timeout);
              };
          }

          /* Search */
          searchItem.addEventListener("input", debounce(event => datamap.searchText(event.target.value)));
          updateProgressBar('meta-data-progress', 100);
          checkAllDataLoaded();
        }
      };
    }

    loadPointDataLayer();
    loadLabelDataLayer();
    loadMetaData();</script>
</html>
