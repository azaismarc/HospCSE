    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #ffffff;
        font-family: Roboto;
        color: #000000;
      }
      .container-box {
        margin: 4px;
        padding: 12px;
        border-radius: 16px;
        line-height: 0.95;
        z-index: 2;
        background: #ffffffaa;
        box-shadow: 2px 3px 10px #aaaaaa44;
      }
      .more-opaque {
        background-color: #ffffffee;
      }
      #deck-container {
        width: 100vw;
        height: 100vh;
      }
      #deck-container canvas {
        z-index: 1;
        background: #ffffff;
      }
      .deck-tooltip {
          
            font-size: 0.8em;
            font-family: Roboto;
            font-weight: 300;
            color: #000000 !important;
            background-color: #ffffffaa !important;
            border-radius: 12px;
            box-shadow: 2px 3px 10px #aaaaaa44;
            max-width: 25%;
      }
      input {
        margin: 2px;
        padding: 4px;
        border-radius: 8px;
        color: #000000;
        background: #ffffffdd;
        border: 1px solid #ddddddff;
        transition: 0.5s;
        outline: none;
      }
      input:focus {
        border: 2px solid #555;
      }
      #loading {
        width: 100%;
        height: 100%;
        top: 0px;
        left: 0px;
        position: absolute;
        display: block;
        z-index: 99
      }
      #loading-image {
        position: absolute;
        top: 45%;
        left: 47.5%;
        z-index: 100
      }
      #title-container {
        /* position: absolute; */
        top: 0;
        left: 0;
      }
      .content-wrapper {
        /* position: relative; */
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        padding: 8px;
        /* Use grid to create the basic layout */
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        min-height: calc(100vh - 16px); /* Account for padding */
        pointer-events: none; /* pass pointer events through */
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 4px;
        pointer-events: auto; /* allow pointer events */
        max-height: 50vh;
        overflow-y: visible;
      }
      .top-left {
        grid-column: 1;
        grid-row: 1;
        justify-self: start;
        align-self: start;
      }
      .bottom-left {
        grid-column: 1;
        grid-row: 2;
        justify-self: start;
        align-self: end;
        display: flex;
        flex-direction: column-reverse;
        transform: scaleY(-1);
      }

      .top-right {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
        align-self: start;
      }
      .bottom-right {
        grid-column: 2;
        grid-row: 2;
        justify-self: end;
        align-self: end;
        display: flex;
        flex-direction: column-reverse;
        transform: scaleY(-1);
      }
      .stack.bottom-left .stack-box {
        transform: scaleY(-1);
      }
      .stack.bottom-right .stack-box {
        transform: scaleY(-1);
      }
      #search-container{
        width: fit-content;
      }
    </style>

            result.set(arr, currentLength);
            currentLength += arr.length;

    // Blob for the parsing worker
    const parsingWorkerBlob = new Blob([`
      self.onmessage = async function(event) {
      const { encodedData, JSONParse } = event.data;
        // Function to parse base64 to Uint8Array
        async function DecompressBytes(bytes) {
          const blob = new Blob([bytes]);
          const decompressedStream = blob.stream().pipeThrough(
            new DecompressionStream("gzip")
          );
          const arr = await new Response(decompressedStream).arrayBuffer()
          return new Uint8Array(arr);
        }
        async function decodeBase64WithProgress(base64) {
          const totalLength = base64.length;
          const chunkSize = 1024 * 1024; // 1MB chunks
          let decodedArray = new Uint8Array(Math.ceil(totalLength * 3 / 4));
          let offset = 0;

          for (let i = 0; i < totalLength; i += chunkSize) {
            const chunk = base64.slice(i, i + chunkSize);
            const decodedChunk = Uint8Array.from(atob(chunk), c => c.charCodeAt(0));
            decodedArray.set(decodedChunk, offset);
            offset += decodedChunk.length;

            const progress = Math.min(100, Math.round((i + chunkSize) / totalLength * 100));
            self.postMessage({ type: 'progress', progress: progress });

            // Allow other operations to occur
            await new Promise(resolve => setTimeout(resolve, 0));
          }

          return decodedArray.slice(0, offset);
        }
        const binaryData = await decodeBase64WithProgress(encodedData).then(buffer => DecompressBytes(buffer));

        if (JSONParse) {
          const parsedData = JSON.parse(new TextDecoder("utf-8").decode(binaryData));
          self.postMessage({ data: parsedData });
        } else {
          // Send the parsed table back to the main thread
          self.postMessage({ type: "data", data: binaryData });
        }
      }
    `], { type: 'application/javascript' });
